openapi: 3.0.3
info:
  title: POS System API
  version: 1.0.0
  description: RESTful API for Point of Sale System - supports Web Admin Frontend and Electron POS App

servers:
  - url: http://localhost:3000/api
    description: Development server
  - url: https://natsafestore.com.ng/api
    description: Production server

security:
  - bearerAuth: []

paths:

  /auth/login:
    post:
      summary: User login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: "admin@natsafestore.com.ng"
                password:
                  type: string
                  example: "123456"
      responses:
        200:
          description: Login successful - returns JWT token
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        401:
          description: Invalid credentials

  /users:
      get:
        summary: Get all users
        tags: [User]
        responses:
          200:
            description: List of users
            content:
              application/json:
                schema:
                  type: array
                  items:
                    $ref: '#/components/schemas/User'
      post:
        summary: Create new user
        tags: [User]
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        responses:
          201:
            description: User created
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/User'

  /users/me:
    get:
      summary: Get current user profile
      tags: [User]
      responses:
        200:
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        401:
          description: Unauthorized - invalid or missing token
  

  /users/{id}:
    patch:
      summary: Update user
      tags: [User]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        200:
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    delete:
      summary: Delete user
      tags: [User]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        204:
          description: User deleted

  /products:
    get:
      summary: List all products
      tags: [Product]
      responses:
        200:
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
    post:
      summary: Create product
      tags: [Product]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
      responses:
        201:
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
  /products/{id}:
    patch:
      summary: Update product
      tags: [Product]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
      responses:
        200:
          description: Product updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
    delete:
      summary: Delete product
      tags: [Product]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        204:
          description: Product deleted

  /sales:
    get:
      summary: Get all sales
      tags: [Sale]
      responses:
        200:
          description: List of sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Sale'
    post:
      summary: Create sale
      tags: [Sale]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Sale'
      responses:
        201:
          description: Sale created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sale'
  /sales/{id}:
    patch:
      summary: Update sale
      tags: [Sale]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Sale'
      responses:
        200:
          description: Sale updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sale'
    delete:
      summary: Delete sale
      tags: [Sale]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        204:
          description: Sale deleted

  /categories:
    get:
      summary: List all categories
      tags: [Category]
      responses:
        200:
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
    post:
      summary: Create category
      tags: [Category]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Category'
      responses:
        201:
          description: Category created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
  /categories/{id}:
    patch:
      summary: Update category
      tags: [Category]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Category'
      responses:
        200:
          description: Category updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
    delete:
      summary: Delete category
      tags: [Category]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        204:
          description: Category deleted

  /sync:
    post:
      summary: Sync data between Electron and server
      tags: [Sync]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                products:
                  type: array
                  items:
                    $ref: '#/components/schemas/Product'
                sales:
                  type: array
                  items:
                    $ref: '#/components/schemas/Sale'
                categories:
                  type: array
                  items:
                    $ref: '#/components/schemas/Category'
      responses:
        200:
          description: Sync results
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  updatedSince:
                    type: object

  /sync/unsynced:
    get:
      summary: Get all unsynced records (products, sales, categories)
      tags: [Sync]
      responses:
        200:
          description: Returns unsynced data from the server
          content:
            application/json:
              schema:
                type: object
                properties:
                  products:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
                  sales:
                    type: array
                    items:
                      $ref: '#/components/schemas/Sale'
                  categories:
                    type: array
                    items:
                      $ref: '#/components/schemas/Category'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      required:
        - name
        - email
        - password
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "John Doe"
        email:
          type: string
          format: email
          example: "admin@natsafestore.com.ng"
        password:
          type: string
          example: "hashed_password"
        role:
          type: string
          default: user
          example: admin
        deleted:
          type: boolean
          default: false
        synced:
          type: boolean
          default: false
        created_at:
          type: string
          format: date-time
          example: "2026-02-25T10:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-02-25T10:00:00Z"
    Product:
      type: object
      required:
        - name
        - sku
        - price
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Coca Cola 50cl"
        sku:
          type: string
          example: "COKE-50CL"
        price:
          type: number
          format: float
          example: 350
        image:
          type: string
          nullable: true
          example: "https://example.com/image.jpg"
        category_id:
          type: integer
          nullable: true
          example: 1
        quantity:
          type: integer
          default: 0
          example: 100
        description:
          type: string
          nullable: true
          example: "Chilled soft drink"
        deleted:
          type: boolean
          default: false
        synced:
          type: boolean
          default: false
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Sale:
      type: object
      required:
        - items
        - total_amount
      properties:
        id:
          type: integer
        items:
          type: string
        total_amount:
          type: number
        payment_method:
          type: string
        deleted:
          type: boolean
        synced:
          type: boolean
        created_at:
          type: string
        updated_at:
          type: string
    Category:
      type: object
      required:
        - name
      properties:
        id:
          type: integer
        name:
          type: string
        deleted:
          type: boolean
        synced:
          type: boolean
        created_at:
          type: string
        updated_at:
          type: string