schemas:

  User:
    type: object
    required:
      - name
      - email
      - password
    properties:
      name:
        type: string
        example: "John Doe"
      email:
        type: string
        format: email
        example: "admin@natsafestore.com.ng"
      password:
        type: string
        example: "hashed_password"
      role:
        type: string
        default: user
        example: admin
      deleted:
        type: boolean
        default: false
      synced:
        type: boolean
        default: false
      created_at:
        type: string
        format: date-time
        example: "2026-02-25T10:00:00Z"
      updated_at:
        type: string
        format: date-time
        example: "2026-02-25T10:00:00Z"

  Category:
    type: object
    required:
      - name
    properties:
      name:
        type: string
        example: "Beverages"
      deleted:
        type: boolean
        default: false
      synced:
        type: boolean
        default: false
      created_at:
        type: string
        format: date-time
        example: "2026-02-25T10:00:00Z"
      updated_at:
        type: string
        format: date-time
        example: "2026-02-25T10:00:00Z"

  Product:
    type: object
    required:
      - name
      - sku
      - price
    properties:
      name:
        type: string
        example: "Coca Cola 50cl"
      sku:
        type: string
        example: "COKE-50CL"
      price:
        type: number
        format: float
        example: 350
      image:
        type: string
        nullable: true
        example: "https://example.com/image.jpg"
      category_id:
        type: integer
        nullable: true
        example: 1
      quantity:
        type: integer
        default: 0
        example: 100
      description:
        type: string
        nullable: true
        example: "Chilled soft drink"
      deleted:
        type: boolean
        default: false
      synced:
        type: boolean
        default: false
      created_at:
        type: string
        format: date-time
        example: "2026-02-25T10:00:00Z"
      updated_at:
        type: string
        format: date-time
        example: "2026-02-25T10:00:00Z"

  Sale:
    type: object
    required:
      - items
      - total_amount
    properties:
      items:
        type: string
        description: JSON string of sale items
        example: '[{"productId":1,"quantity":2,"price":350}]'
      total_amount:
        type: number
        format: float
        example: 700
      payment_method:
        type: string
        default: cash
        example: cash
      deleted:
        type: boolean
        default: false
      synced:
        type: boolean
        default: false
      created_at:
        type: string
        format: date-time
        example: "2026-02-25T10:00:00Z"
      updated_at:
        type: string
        format: date-time
        example: "2026-02-25T10:00:00Z"